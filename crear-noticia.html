<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nueva Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Publicar una Nueva Noticia</h4>
                    </div>
                    <div class="card-body">
                        <form id="form-noticia">
                            <div class="mb-3">
                                <label class="form-label">Título de la Noticia</label>
                                <input type="text" id="titulo" class="form-control" placeholder="Ej: Avances en IA" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select id="categoria" class="form-select" required>
                                    <option value="Politica">Política</option>
                                    <option value="Tecnologia">Tecnología</option>
                                    <option value="Deportes">Deportes</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contenido</label>
                                <textarea id="contenido" class="form-control" rows="5" placeholder="Escribe el cuerpo de la noticia aquí..." required></textarea>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="index.html" class="btn btn-secondary">Volver al Inicio</a>
                                <button type="submit" class="btn btn-success">Publicar Noticia</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
