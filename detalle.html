<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de la Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Volver al Inicio</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <article class="card shadow-sm p-4 mb-4">
                    <div id="detalle-noticia">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                </article>

                <section class="card shadow-sm p-4 mb-5">
                    <h5>Comentarios</h5>
                    <hr>
                    <div id="lista-comentarios" class="mb-4">
                        <p class="text-muted small">No hay comentarios aún.</p>
                    </div>
                    <form id="form-comentario">
                        <div class="mb-3">
                            <textarea id="texto-comentario" class="form-control" rows="2" placeholder="Escribe un comentario..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Publicar Comentario</button>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
